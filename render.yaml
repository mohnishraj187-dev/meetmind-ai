services:
  - type: web
    name: meetmind-ai
    runtime: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: meetmind-ai-db
          property: connectionString

databases:
  - name: meetmind-ai-db
    databaseName: meetmind_ai
    user: meetmind_ai_user
